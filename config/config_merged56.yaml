training:
  epochs: 80
  batch_size: 8
  num_workers: 0
  pin_memory: false
  optimizer:
    name: AdamW
    lr: 0.0005
    weight_decay: 0.0003
    betas: [0.9, 0.999]
  scheduler:
    name: CosineAnnealingLR
    T_max: 80
    eta_min: 0.000001
  loss:
    lambda_heat: 1.0
    lambda_cls: 1.0
    lambda_box: 1.5
    lambda_obj: 2.0
  augmentation:
    enable: true
    horizontal_flip: 0.5
    brightness_contrast: 0.4
    hue_saturation: 0.3
    gauss_noise: 0.2
    rotation: 10
    scale: [0.8, 1.2]

validation:
  interval: 1
  save_best: true
  metric: val_loss

checkpoint:
  save_dir: ./outputs/checkpoints
  save_interval: 10
  keep_last_n: 5
  resume_from: null

logging:
  log_dir: ./outputs/logs
  use_tensorboard: true
  use_wandb: false
  print_interval: 20

hardware:
  device: cuda
  gpu_ids: [0]
  mixed_precision: true
  cudnn_benchmark: true
