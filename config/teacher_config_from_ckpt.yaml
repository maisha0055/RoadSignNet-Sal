augmentation:
  copy_paste:
    enabled: true
    prob: 0.2
  degrees: 0.0
  horizontal_flip: 0.5
  hsv:
    enabled: true
    h_gain: 0.015
    prob: 0.5
    s_gain: 0.7
    v_gain: 0.4
  mixup:
    alpha: 0.5
    enabled: true
    prob: 0.15
  mosaic:
    enabled: true
    prob: 0.5
  perspective: 0.0
  scale: 0.5
  shear: 0.0
  translate: 0.1
  vertical_flip: 0.0
checkpoint:
  save_best: true
  save_dir: D:\RoadSignNet-SAL-main\outputs\v6_fast\checkpoints
  save_interval: 10
  save_last: true
data:
  img_size: 224
  num_workers: 0
  pin_memory: false
  test_img_dir: D:\RoadSignNet-SAL-main\RoadSignNet-SAL-main\data\test\images
  test_label_dir: D:\RoadSignNet-SAL-main\RoadSignNet-SAL-main\data\test\labels
  train_img_dir: D:\RoadSignNet-SAL-main\RoadSignNet-SAL-main\data\train\images
  train_label_dir: D:\RoadSignNet-SAL-main\RoadSignNet-SAL-main\data\train\labels
  val_img_dir: D:\RoadSignNet-SAL-main\RoadSignNet-SAL-main\data\valid\images
  val_label_dir: D:\RoadSignNet-SAL-main\RoadSignNet-SAL-main\data\valid\labels
distillation:
  enabled: true
  epochs: 20
  lambda_att: 0.2
  lambda_bbox: 0.15
  lambda_box: 0.15
  lambda_cls: 0.8
  lambda_feat: 0.2
  lambda_logit: 0.8
  lambda_obj: 0.35
  ramp_epochs: 5
  student_backbone: efficientnet_b0
  student_kan_grid: 8
  student_type: transfer
  student_use_kan_cls: true
  teacher_backbone: densenet121+efficientnet_b0+vit_tiny_patch16_224
  teacher_checkpoint: outputs/v6_fast/checkpoints/best_model.pth
  teacher_conf_thresh: 0.35
  teacher_model: yolo11s.pt
  temperature: 2.0
  warmup_epochs: 3
ema:
  decay: 0.9999
  enabled: true
experiment:
  description: Ultimate training with Mosaic, Knowledge Distillation, and optimized
    hyperparameters
  deterministic: true
  name: roadsignnet_sal_v6_ultimate
  seed: 42
export:
  formats:
  - onnx
  - torchscript
  onnx: true
  quantize: false
  save_dir: outputs/v6_fast/exports
  tflite: false
  torchscript: true
hardware:
  cudnn_benchmark: true
  device: cuda
  gpu_ids:
  - 0
  mixed_precision: true
logging:
  log_dir: D:\RoadSignNet-SAL-main\outputs\v6_fast\logs
  save_interval: 10
  tensorboard: true
  use_tensorboard: true
  wandb: false
loss:
  focal_alpha: 0.25
  focal_gamma: 2.0
  lambda_box: 2.0
  lambda_cls: 1.0
  lambda_heat: 1.0
model:
  backbone: densenet121+efficientnet_b0+vit_tiny_patch16_224
  class_names:
  - bicycle
  - bus_stop
  - children
  - crosswalk
  - do_not_stop
  - do_not_turn_left
  - do_not_turn_right
  - do_not_u_turn
  - enter_left_lane
  - give_way
  - green_light
  - left_lane_enter
  - left_turn
  - narrow_road
  - no_entry
  - no_overtaking
  - no_parking
  - no_stop
  - no_waiting
  - parking
  - railway_crossing
  - red_light
  - refueling
  - right_turn
  - road_main
  - road_work
  - school_nearby
  - speed_bump
  - speed_limit_100
  - speed_limit_120
  - speed_limit_20
  - speed_limit_30
  - speed_limit_40
  - speed_limit_50
  - speed_limit_60
  - speed_limit_70
  - speed_limit_80
  - stop
  - t_intersection_l
  - t_intersection_r
  - traffic_sign
  - truck
  - yellow_light
  freeze_backbone: false
  kan_grid: 8
  num_classes: 43
  pretrained: false
  pretrained_path: null
  use_kan_cls: true
  width_multiplier: 1.5
multi_scale:
  enabled: false
  interval: 10
  sizes:
  - 480
  - 544
  - 608
  - 640
  - 704
  - 768
training:
  accumulation_steps: 2
  amp: true
  batch_size: 8
  early_stopping:
    enabled: false
    min_delta: 0.001
    patience: 30
  epochs: 30
  grad_clip: 10.0
  img_size: 224
  loss:
    lambda_box: 2.0
    lambda_cls: 1.0
    lambda_obj: 1.0
  num_workers: 0
  optimizer:
    betas:
    - 0.9
    - 0.999
    lr: 0.001
    name: adamw
    weight_decay: 0.01
  scheduler:
    T_max: 145
    eta_min: 1.0e-06
    min_lr: 1.0e-06
    name: cosine_annealing_warmup
    warmup_epochs: 5
validation:
  conf_thresh: 0.1
  interval: 1
  max_detections: 100
  nms_thresh: 0.45
