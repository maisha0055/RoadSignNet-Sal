experiment:
  name: roadsignnet_sal_teacher_mapped43_eval_cpu
  description: CPU evaluation config for mapped 43-class teacher
  seed: 42
  deterministic: true

model:
  num_classes: 43
  class_names:
  - bicycle
  - bus_stop
  - children
  - crosswalk
  - do_not_stop
  - do_not_turn_left
  - do_not_turn_right
  - do_not_u_turn
  - enter_left_lane
  - give_way
  - green_light
  - left_lane_enter
  - left_turn
  - narrow_road
  - no_entry
  - no_overtaking
  - no_parking
  - no_stop
  - no_waiting
  - parking
  - railway_crossing
  - red_light
  - refueling
  - right_turn
  - road_main
  - road_work
  - school_nearby
  - speed_bump
  - speed_limit_100
  - speed_limit_120
  - speed_limit_20
  - speed_limit_30
  - speed_limit_40
  - speed_limit_50
  - speed_limit_60
  - speed_limit_70
  - speed_limit_80
  - stop
  - t_intersection_l
  - t_intersection_r
  - traffic_sign
  - truck
  - yellow_light
  width_multiplier: 1.35
  pretrained: false
  pretrained_path: null

data:
  train_img_dir: ./downloads/merged_all_mapped43/train/images
  train_label_dir: ./downloads/merged_all_mapped43/train/labels
  val_img_dir: ./downloads/merged_all_mapped43/valid/images
  val_label_dir: ./downloads/merged_all_mapped43/valid/labels
  test_img_dir: ./downloads/merged_all_mapped43/test/images
  test_label_dir: ./downloads/merged_all_mapped43/test/labels
  img_size: 320

training:
  epochs: 30
  batch_size: 8
  num_workers: 0
  pin_memory: false
  optimizer:
    name: AdamW
    lr: 0.0005
    weight_decay: 0.0003
    betas: [0.9, 0.999]
  scheduler:
    name: CosineAnnealingLR
    T_max: 30
    eta_min: 0.000001
  loss:
    lambda_heat: 1.0
    lambda_cls: 1.0
    lambda_box: 1.5
    lambda_obj: 2.0

hardware:
  device: cpu
  gpu_ids: []
  mixed_precision: false
  cudnn_benchmark: false

validation:
  interval: 1
  save_best: true
  metric: val_loss