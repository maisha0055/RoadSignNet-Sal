# Hard-negative finetuning config for the realtime teacher checkpoint
# Resume from outputs/v6_realtime_teacher/checkpoints/best_model_map.pth
# Requires mined hard negatives under outputs/hard_negatives/

experiment:
  name: roadsignnet_sal_v6_realtime_teacher_hardneg_finetune
  description: Teacher finetune with hard negatives to reduce false positives and improve mAP/F1
  seed: 42
  deterministic: true

model:
  num_classes: 43
  width_multiplier: 1.0
  pretrained: false
  pretrained_path: null
  backbone: "efficientnet_b0+vit_tiny_patch16_224"
  freeze_backbone: false
  use_kan_cls: true
  kan_grid: 8
  class_names:
    - bicycle
    - bus_stop
    - children
    - crosswalk
    - do_not_stop
    - do_not_turn_left
    - do_not_turn_right
    - do_not_u_turn
    - enter_left_lane
    - give_way
    - green_light
    - left_lane_enter
    - left_turn
    - narrow_road
    - no_entry
    - no_overtaking
    - no_parking
    - no_stop
    - no_waiting
    - parking
    - railway_crossing
    - red_light
    - refueling
    - right_turn
    - road_main
    - road_work
    - school_nearby
    - speed_bump
    - speed_limit_100
    - speed_limit_120
    - speed_limit_20
    - speed_limit_30
    - speed_limit_40
    - speed_limit_50
    - speed_limit_60
    - speed_limit_70
    - speed_limit_80
    - stop
    - t_intersection_l
    - t_intersection_r
    - traffic_sign
    - truck
    - yellow_light

training:
  epochs: 35
  batch_size: 8
  img_size: 224
  num_workers: 0
  accumulation_steps: 2

  optimizer:
    name: adamw
    lr: 0.00012
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: cosine_annealing_warmup
    warmup_epochs: 3
    min_lr: 0.000001
    T_max: 32
    eta_min: 0.000001

  amp: true
  grad_clip: 10.0

  loss:
    lambda_cls: 1.0
    lambda_box: 1.6
    lambda_obj: 2.3

  early_stopping:
    enabled: false
    patience: 12
    min_delta: 0.001

data:
  train_img_dir: "downloads/merged_all_mapped43/train/images;outputs/hard_negatives/crops"
  train_label_dir: "downloads/merged_all_mapped43/train/labels;outputs/hard_negatives/labels"
  val_img_dir: "downloads/merged_all_mapped43/valid/images"
  val_label_dir: "downloads/merged_all_mapped43/valid/labels"
  test_img_dir: "downloads/merged_all_mapped43/test/images"
  test_label_dir: "downloads/merged_all_mapped43/test/labels"
  img_size: 224
  num_workers: 0
  pin_memory: false

logging:
  log_dir: "outputs/v6_realtime_teacher_hardneg/logs"
  save_interval: 5
  tensorboard: true
  use_tensorboard: true
  wandb: false

checkpoint:
  save_dir: "outputs/v6_realtime_teacher_hardneg/checkpoints"
  save_best: true
  save_last: true
  save_interval: 5

export:
  save_dir: "outputs/v6_realtime_teacher_hardneg/exports"
  formats: [onnx, torchscript]
  quantize: false
  onnx: true
  torchscript: true
  tflite: false

hardware:
  device: cuda
  gpu_ids: [0]
  mixed_precision: true
  cudnn_benchmark: true
