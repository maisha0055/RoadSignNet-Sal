# Distillation config: teacher -> same-arch hybrid student with hard negatives
experiment:
  name: roadsignnet_sal_v6_realtime_teacher_distill_full
  description: Distill realtime teacher into hybrid student with hard negatives and longer schedule
  seed: 42
  deterministic: true

model:
  num_classes: 43
  width_multiplier: 1.0
  pretrained: false
  pretrained_path: null
  backbone: "efficientnet_b0+vit_tiny_patch16_224"
  freeze_backbone: false
  use_kan_cls: true
  kan_grid: 8

training:
  epochs: 40
  batch_size: 6
  img_size: 224
  num_workers: 4

  optimizer:
    name: adamw
    lr: 0.0002
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: cosine_annealing
    eta_min: 0.000001

  amp: true
  grad_clip: 10.0

  loss:
    lambda_cls: 1.0
    lambda_box: 1.6
    lambda_obj: 2.3

  early_stopping:
    enabled: false

_data_note: "Hard negatives included via semicolon-separated roots"
data:
  train_img_dir: "downloads/merged_all_mapped43/train/images;outputs/hard_negatives/crops"
  train_label_dir: "downloads/merged_all_mapped43/train/labels;outputs/hard_negatives/labels"
  val_img_dir: "downloads/merged_all_mapped43/valid/images"
  val_label_dir: "downloads/merged_all_mapped43/valid/labels"
  test_img_dir: "downloads/merged_all_mapped43/test/images"
  test_label_dir: "downloads/merged_all_mapped43/test/labels"
  img_size: 224
  num_workers: 4
  pin_memory: false

logging:
  log_dir: "outputs/v6_realtime_teacher_distill_full/logs"
  save_interval: 5
  tensorboard: true
  use_tensorboard: true
  wandb: false

checkpoint:
  save_dir: "outputs/v6_realtime_teacher_distill_full/checkpoints"
  save_best: true
  save_last: true
  save_interval: 5

export:
  save_dir: "outputs/v6_realtime_teacher_distill_full/exports"
  formats: [onnx, torchscript]
  quantize: false
  onnx: true
  torchscript: true
  tflite: false

distillation:
  enabled: true
  teacher_backbone: efficientnet_b0+vit_tiny_patch16_224
  teacher_checkpoint: outputs/v6_realtime_teacher/checkpoints/best_model_map.pth
  teacher_use_kan_cls: true
  teacher_kan_grid: 8

  student_type: transfer
  student_backbone: efficientnet_b0+vit_tiny_patch16_224
  student_use_kan_cls: true
  student_kan_grid: 8

  temperature: 2.0
  lambda_cls: 1.0
  lambda_box: 0.5
  lambda_obj: 0.5
  lambda_total: 1.0
  epochs: 40
  warmup_epochs: 3
  ramp_epochs: 6
  teacher_conf_thresh: 0.25

hardware:
  device: cuda
  gpu_ids: [0]
  mixed_precision: true
  cudnn_benchmark: true
